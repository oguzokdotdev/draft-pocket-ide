workflows:
  ios-build:
    name: iOS Build
    triggering:
      events:
        - push
      branch:
        include:
          - main
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      groups:
        - main
      vars:
        XCODE_PROJECT: "Draft.xcodeproj"
        XCODE_SCHEME: "Draft"
        IPA_NAME: "draft_pocket_ide.ipa"
      xcode: latest
    scripts:
      - name: Initialize keychain
        script: keychain initialize
      - name: Build Xcode Project
        script: |
          xcodebuild build \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            OBJROOT=$FCI_BUILD_DIR/build \
            SYMROOT=$FCI_BUILD_DIR/build
      - name: Package IPA
        script: |
          APP_PATH=$(find $FCI_BUILD_DIR/build/Release-iphoneos -name "*.app" -type d | head -n 1)
          if [ -z "$APP_PATH" ]; then
              echo "ERR: .app file not found"
              exit 1
          fi
          
          echo "Found bundle: $APP_PATH"
          PAYLOAD_DIR="Payload"
          
          rm -rf "$PAYLOAD_DIR" "$IPA_NAME"
          mkdir -p "$PAYLOAD_DIR"
          
          echo "Pack into $IPA_NAME..."
          cp -RL "$APP_PATH" "$PAYLOAD_DIR/"
          zip -qr -y "$IPA_NAME" "$PAYLOAD_DIR"
          
          rm -rf "$PAYLOAD_DIR"
          echo "All set! IPA maked: $IPA_NAME"
    artifacts:
      - "*.ipa"